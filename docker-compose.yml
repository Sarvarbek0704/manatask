services:
  db:
    image: postgres:16-alpine
    container_name: manatask-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: manatask
      POSTGRES_PASSWORD: manatask
      POSTGRES_DB: manatask
    ports:
      - "5432:5432"
    volumes:
      - manatask_pgdata:/var/lib/postgresql/data

volumes:
  manatask_pgdata:
