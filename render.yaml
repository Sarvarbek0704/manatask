# Render blueprint for the manaTask API (Docker).
# In Render: New → Blueprint → connect this repo. Fill the `sync: false` secrets.
services:
  - type: web
    name: manatask-api
    runtime: docker
    dockerfilePath: ./Dockerfile.api
    dockerContext: .
    plan: free
    region: frankfurt
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: API_PREFIX
        value: api
      - key: DB_SSL
        value: "true"
      - key: DB_SYNCHRONIZE
        value: "false"
      # Apply pending migrations automatically on each deploy.
      - key: DB_MIGRATIONS_RUN
        value: "true"
      - key: REQUIRE_EMAIL_VERIFICATION
        value: "true"
      # Strong JWT secrets are generated by Render once and kept stable.
      - key: JWT_ACCESS_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: JWT_ACCESS_TTL
        value: 900s
      - key: JWT_REFRESH_TTL
        value: 30d
      # ---- Fill these in the Render dashboard (Environment) ----
      - key: DATABASE_URL          # Neon pooled connection string
        sync: false
      - key: DIRECT_DATABASE_URL   # Neon direct (non-pooled) — used for migrations
        sync: false
      - key: WEB_ORIGIN            # https://<your-app>.vercel.app (comma-separate extra domains)
        sync: false
      - key: API_PUBLIC_URL        # https://manatask-api.onrender.com/api
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GOOGLE_CALLBACK_URL   # https://manatask-api.onrender.com/api/auth/google/callback
        sync: false
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: MAIL_FROM
        sync: false
      # Optional
      - key: REDIS_URL
        sync: false
      - key: SENTRY_DSN
        sync: false
      - key: S3_BUCKET
        sync: false
      - key: S3_REGION
        sync: false
      - key: S3_ACCESS_KEY_ID
        sync: false
      - key: S3_SECRET_ACCESS_KEY
        sync: false
      - key: S3_ENDPOINT
        sync: false
