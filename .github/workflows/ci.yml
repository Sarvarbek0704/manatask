name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: manatask
          POSTGRES_PASSWORD: manatask
          POSTGRES_DB: manatask_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      TEST_DATABASE_URL: postgresql://manatask:manatask@localhost:5432/manatask_test
      JWT_ACCESS_SECRET: ci-access-secret
      JWT_REFRESH_SECRET: ci-refresh-secret

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build shared package
        run: npm run build:shared

      - name: Build API
        run: npm run build -w @manatask/api

      - name: Build web
        run: npm run build -w @manatask/web
        env:
          NEXT_PUBLIC_API_URL: http://localhost:4000/api
          NEXT_PUBLIC_WS_URL: http://localhost:4000

      - name: Unit tests (API)
        run: npm test -w @manatask/api

      - name: E2E tests (API)
        run: npm run test:e2e -w @manatask/api
